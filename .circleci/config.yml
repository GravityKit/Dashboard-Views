version: 2.1

anchors:
  context: &context
    context: shared

  default_job_config: &default_job_config
    working_directory: /home/circleci/plugin
    machine:
      image: default

  test_job_config: &test_job_config
    <<: *context
    requires:
      - prepare_test_and_build_environment

jobs:
  prepare_test_and_build_environment:
    <<: *default_job_config
    steps:
      - checkout
      - run: date +%F > .date
      - run:
          name: Getting GK test/build tools
          command: |
            git clone git@github.com:GravityKit/Tooling.git /home/circleci/tooling
      - run:
          name: Create .npmrc
          command: |
            echo "//npm.pkg.github.com/:_authToken=${GH_AUTH_TOKEN}" >> ~/.npmrc
            echo "@gravitykit:registry=https://npm.pkg.github.com" >> ~/.npmrc
      - restore_cache:
          keys:
            - node-dependencies-{{ .Environment.CACHE_VERSION }}-{{ checksum "package-lock.json" }}
      - restore_cache:
          keys:
            - composer-dependencies-{{ .Environment.CACHE_VERSION }}-{{ checksum "composer.lock" }}
      - run:
          name: Installing dependencies
          command: |
            /home/circleci/tooling/build-tools/build_tools.sh npm -o install
            /home/circleci/tooling/build-tools/build_tools.sh composer -o install
      - run:
          name: Configure E2E environment
          command: |
            # GravityForms — required by every GK plugin
            /home/circleci/tooling/build-tools/build_tools.sh gh -o 'release download -R gravityforms/gravityforms --clobber --pattern "*.zip" --dir .tmp'
            unzip .tmp/gravityforms*.zip -d .tmp
            # GravityView — Dashboard Views hooks into `gravityview/loaded` to register Foundation,
            # so without GravityView active the GK licenses admin page is never registered and the
            # license activation smoke test cannot find the product card.
            /home/circleci/tooling/build-tools/build_tools.sh gh -o 'release download -R GravityKit/GravityView --clobber --pattern "gravityview-*.zip" --dir .tmp'
            unzip .tmp/gravityview-*.zip -d .tmp
            cp .env.sample .env
            sed -i "s|WP_ENV_PLUGINS=.*|WP_ENV_PLUGINS=${PWD}/.tmp/gravityforms,${PWD}/.tmp/gravityview|" .env
            sed -i "s|GRAVITY_FORMS_LICENSE_KEY=.*|GRAVITY_FORMS_LICENSE_KEY=${GRAVITYFORMS_KEY}|" .env
            sed -i "s|GRAVITYKIT_LICENSE_KEY=.*|GRAVITYKIT_LICENSE_KEY=${GRAVITYVIEW_KEY}|" .env
      - save_cache:
          key: node-dependencies-{{ .Environment.CACHE_VERSION }}-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
      - save_cache:
          key: composer-dependencies-{{ .Environment.CACHE_VERSION }}-{{ checksum "composer.lock" }}
          paths:
            - vendor
            - vendor_prefixed
      - persist_to_workspace:
          root: /home/circleci
          paths:
            - .

  run_e2e_tests:
    <<: *default_job_config
    parallelism: 1
    resource_class: xlarge
    steps:
      - attach_workspace:
          at: /home/circleci
      - run:
          name: Run E2E tests
          command: |
            attempt=0
            max_attempts=3
            sleep_time=5
            while [ $attempt -lt $max_attempts ]; do
              npm run tests:e2e:setup && break
              attempt=$(( attempt + 1 ))
              rm -rf /home/circleci/.wp-env
              echo "Retrying WP-ENV setup in $sleep_time seconds… (attempt $attempt/$max_attempts)"
              sleep $sleep_time
            done
            if [ $attempt -eq $max_attempts ]; then
              echo "WP-ENV setup failed."
              exit 1
            fi
            TESTFILES=$(circleci tests glob "tests/E2E/tests/**/*.spec.js")
            echo "$TESTFILES" | circleci tests run --command="xargs npx playwright test --config=tests/E2E/setup/playwright.config.js" --verbose
      - store_artifacts:
          path: tests/E2E/results
      - store_artifacts:
          path: tests/E2E/report
      - store_test_results:
          path: tests/E2E/results/junit.xml

  build_package_release:
    <<: *default_job_config
    environment:
      # Disable husky pre-commit hooks during CI. `package_build` makes a
      # git commit, which fires .husky/pre-commit → lint-staged →
      # `vendor/bin/phpcs`. Since `composer install --no-dev` strips phpcs
      # (it is a dev dependency), the hook fails with ENOENT and CI dies.
      # This bug has existed on develop since CI was first configured —
      # see GravityKit/Dashboard-Views#29 for the full root-cause analysis.
      HUSKY: "0"
    steps:
      - attach_workspace:
          at: /home/circleci
      - run:
          name: Building
          command: |
            /home/circleci/tooling/build-tools/build_tools.sh composer -o "install --no-dev"
            /home/circleci/tooling/build-tools/build_tools.sh grunt
      - run:
          name: Trigger translation pipeline
          command: |
            if [ "${CIRCLE_BRANCH}" == "develop" ] || [ "${CIRCLE_BRANCH}" == "main" ]; then
              /home/circleci/tooling/build-tools/build_tools.sh trigger_translation -o "gk-gravityview-dashboard-views"
            else
              echo "Skipping translation pipeline (branch: ${CIRCLE_BRANCH})."
            fi
      - run:
          name: Packaging
          command: |
            if [ "${CIRCLE_BRANCH}" != "main" ]; then
              /home/circleci/tooling/build-tools/build_tools.sh package_build -o "gravityview-dashboard gravityview-dashboard-views.php --include-hash"
            else
              /home/circleci/tooling/build-tools/build_tools.sh package_build -o "gravityview-dashboard gravityview-dashboard-views.php $([[ $(git log -n 1 | grep "\[skip release\]") ]] && echo --include-hash)"
            fi
            mkdir -p gravityview-dashboard
            mv vendor gravityview-dashboard
            mv build gravityview-dashboard
            zip -gr $(ls gravityview-dashboard-*.zip) gravityview-dashboard build
            mkdir .release
            cp gravityview-dashboard-*.zip .release
      - run:
          name: Creating a GitHub release
          command: |
            if [ "${CIRCLE_BRANCH}" == "main" ]; then
              git config user.email "support@gravitykit.com"
              git config user.name "GravityKit - CI"
              /home/circleci/tooling/build-tools/build_tools.sh create_release -o "gravityview-dashboard-views.php $(ls gravityview-dashboard-*.zip)"
            fi
      - run:
          name: Notifying GravityKit Release Manager
          command: |
            if ! [[ $(git log -n 1 | grep "\[skip notify\]") ]]; then
              /home/circleci/tooling/build-tools/build_tools.sh announce_build -o "gravityview-dashboard-views.php $(ls gravityview-dashboard-*.zip) --with-circle"
            fi
      - store_artifacts:
          path: .release
          destination: release

workflows:
  version: 2
  test_and_package:
    jobs:
      - prepare_test_and_build_environment:
          <<: *context
      - run_e2e_tests:
          <<: *test_job_config
      - build_package_release:
          <<: *context
          requires:
            - run_e2e_tests
