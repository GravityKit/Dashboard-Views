version: 2.1

anchors:
  context: &context
    context: shared

  default_job_config: &default_job_config
    working_directory: /home/circleci/plugin
    machine:
      image: default

  test_job_config: &test_job_config
    <<: *context
    requires:
      - prepare

jobs:
  prepare:
    <<: *default_job_config
    steps:
      - checkout
      - run:
          name: Fetch tags
          command: git fetch --tags
      - run:
          name: Create .npmrc
          command: |
            echo "//npm.pkg.github.com/:_authToken=${GH_AUTH_TOKEN}" >> ~/.npmrc
            echo "@gravitykit:registry=https://npm.pkg.github.com" >> ~/.npmrc
      - run:
          name: Install dependencies
          command: |
            npx @gravitykit/gktools composer install
            npx @gravitykit/gktools npm install
      - run:
          name: Configure E2E environment
          # Dashboard Views is a GravityView extension: it hooks `gravityview/loaded`
          # to register Foundation, so without GravityView active the GK licenses
          # admin page is never registered and the license activation test cannot
          # find the product card. Mount the latest GravityView release (what
          # customers run) alongside GravityForms into WP_ENV_PLUGINS at boot.
          command: |
            npx @gravitykit/gktools gh release download -R gravityforms/gravityforms --clobber --pattern "*.zip" --dir .tmp
            unzip .tmp/gravityforms*.zip -d .tmp
            npx @gravitykit/gktools gh release download -R GravityKit/GravityView --clobber --pattern "gravityview-*.zip" --dir .tmp
            unzip .tmp/gravityview-*.zip -d .tmp
            cp .env.sample .env
            sed -i "s|WP_ENV_PLUGINS=.*|WP_ENV_PLUGINS=${PWD}/.tmp/gravityforms,${PWD}/.tmp/gravityview|" .env
            sed -i "s|GRAVITY_FORMS_LICENSE_KEY=.*|GRAVITY_FORMS_LICENSE_KEY=${GRAVITYFORMS_KEY}|" .env
            sed -i "s|GRAVITYKIT_LICENSE_KEY=.*|GRAVITYKIT_LICENSE_KEY=${GRAVITYVIEW_KEY}|" .env
      - persist_to_workspace:
          root: /home/circleci
          paths:
            - .

  run_e2e_tests:
    <<: *default_job_config
    parallelism: 1
    resource_class: xlarge
    steps:
      - attach_workspace:
          at: /home/circleci
      - run:
          name: Run E2E tests
          command: |
            attempt=0
            max_attempts=3
            sleep_time=5
            while [ $attempt -lt $max_attempts ]; do
              npm run tests:e2e:setup && break
              attempt=$(( attempt + 1 ))
              sudo rm -rf /home/circleci/.wp-env
              echo "Retrying WP-ENV setup in $sleep_time seconds… (attempt $attempt/$max_attempts)"
              sleep $sleep_time
            done
            if [ $attempt -eq $max_attempts ]; then
              echo "WP-ENV setup failed."
              exit 1
            fi
            TESTFILES=$(circleci tests glob "tests/E2E/tests/**/*.spec.js")
            echo "$TESTFILES" | circleci tests run --command="xargs npx playwright test --config=tests/E2E/setup/playwright.config.js" --verbose
      - store_artifacts:
          path: tests/E2E/results
      - store_artifacts:
          path: tests/E2E/report
      - store_test_results:
          path: tests/E2E/results/junit.xml

  build_package_release:
    <<: *default_job_config
    environment:
      # Disable husky hooks during CI. gktools `build` runs
      # `composer install --no-dev`, which strips phpcs (a dev dependency);
      # later steps that commit (`replace-since --commit`, `translate --commit`,
      # `release`) then fire .husky/pre-commit → lint-staged → phpcs and die with
      # ENOENT. See GravityKit/Dashboard-Views#29 for the full root-cause analysis.
      HUSKY: "0"
    steps:
      - attach_workspace:
          at: /home/circleci
      - run:
          name: Configure git
          command: |
            git config user.email "support@gravitykit.com"
            git config user.name "GravityKit - CI"
      - run:
          name: Replace @since tags
          command: |
            if [ "${CIRCLE_BRANCH}" == "main" ]; then
              npx @gravitykit/gktools replace-since --commit
            else
              echo "Skipping @since tag replacement (only runs on main, before release build)."
            fi
      - run:
          name: Build and package
          command: npx @gravitykit/gktools build
      - run:
          name: Trigger translation pipeline
          command: |
            if [ "${CIRCLE_BRANCH}" == "develop" ] || [ "${CIRCLE_BRANCH}" == "main" ]; then
              npx @gravitykit/gktools translate gk-gravityview-dashboard-views --commit --push
            else
              echo "Skipping translation pipeline."
            fi
      - run:
          name: Create GitHub release
          command: npx @gravitykit/gktools release
      - run:
          name: Announce build
          command: |
            if ! git log -1 --pretty=%B | grep -iq "\[skip notify\]"; then
              npx @gravitykit/gktools announce
            fi
      - run:
          name: Collect build artifacts
          command: |
            mkdir -p .release
            cp gravityview-dashboard-*.zip .release/ 2>/dev/null || true
      - store_artifacts:
          path: .release
          destination: release

workflows:
  version: 2
  test_and_release:
    jobs:
      - prepare:
          <<: *context
      - run_e2e_tests:
          <<: *test_job_config
      - build_package_release:
          <<: *context
          requires:
            - run_e2e_tests
